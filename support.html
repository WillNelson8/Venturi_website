<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Venturi</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, var(--navy) 0%, #2D3B54 100%);
            color: var(--white);
            padding: 80px 0 60px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .page-header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
        }

        .content-section {
            padding: 80px 0;
        }

        .content-card {
            background-color: var(--white);
            padding: 48px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 32px;
        }

        .content-card h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 24px;
        }

        .content-card h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--navy);
            margin-top: 24px;
            margin-bottom: 12px;
        }

        .content-card p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .content-card ul {
            list-style: none;
            padding: 0;
            margin-bottom: 16px;
        }

        .content-card li {
            color: var(--text-secondary);
            padding: 8px 0;
            padding-left: 28px;
            position: relative;
        }

        .content-card li:before {
            content: "→";
            color: var(--accent);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .contact-box {
            background: linear-gradient(135deg, var(--accent) 0%, #667eea 100%);
            color: var(--white);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
        }

        .contact-box h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .contact-box p {
            margin-bottom: 24px;
            opacity: 0.9;
        }

        .contact-box a {
            color: var(--white);
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="index.html" class="logo">
                    <span class="logo-text">Venturi</span>
                </a>
                <div class="nav-links">
                    <a href="index.html#features">Features</a>
                    <a href="support.html">Support</a>
                    <a href="privacy.html">Privacy</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>Support</h1>
            <p>We're here to help you get the most out of Venturi</p>
        </div>
    </div>

    <!-- Content -->
    <section class="content-section">
        <div class="container">
            <div class="contact-box">
                <h3>Still Have Questions?</h3>
                <p>We're happy to help! Reach out to our support team.</p>
                <a href="mailto:support@venturiaviation.com">support@venturiaviation.com</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span>Venturi</span>
                </div>
                <div class="footer-links">
                    <a href="support.html">Support</a>
                    <a href="privacy.html">Privacy Policy</a>
                    <a href="terms.html">Terms of Service</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Venturi Aviation. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
